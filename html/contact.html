<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mark_repair</title>
    <link rel="stylesheet" href="../style/style_contact.css" />
  </head>
  <body>
    <a href="index.html"
      ><img src="../Assets/logo.png" alt="Logo" class="img"
    /></a>
    <main>
      <section class="Callme" id="Contacto">
        <h2>Informacion Extra</h2>
        <p>
          Si quieres contactarme, puedes hacerlo rellenando el siguiente
          formulario:
        </p>
        <div class="Form">
          <form action="" method="POST">
            <label for="nombre ">Nombre completo: </label>
            <input
              type="text"
              id="nombre"
              name="nombre"
              placeholder="Ej. Juan Manuel"
              required
              minlength="3"
              maxlength="50"
            />
            <br />
            <label for="email">Email: </label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="juanmanuel@example.com"
              required
            />
            <br />
            <label for="telefono">Telefono: </label>
            <input
              type="text"
              id="telefono"
              name="telefono"
              placeholder="Ej. 123-456-7890"
              pattern="[0-9]{3}-[0-9]{7}$"
              title="Formato: 123-4567890"
              required
            />
            <br />
            <label for="motivo">Motivo de contacto</label>
            <select id="motivo" name="motivo" required>
              <option value="">Seleccionar...</option>
              <option value="consulta">Consulta</option>
              <option value="propuesta">Propuesta</option>
              <option value="Presupuesto">Presupuesto</option>
              <option value="otro">Otro</option>
            </select>
            <br />
            <label for="mensaje">Mensaje:</label><br />
            <textarea
              id="mensaje"
              name="mensaje"
              placeholder="Escribe tu mensaje aquí..."
              required
              minlength="10"
              maxlength="500"
              rows="5"
              cols="50"
            ></textarea>
            <br />
            <input type="checkbox" id="terminos" name="terminos" required />
            <label for="terminos"
              >Acepto los<a href="./terminos.html" class="link"
                >términos y condiciones</a
              ></label
            ><br />
            <input type="submit" value="Enviar" />
          </form>
        </div>
      </section>
    </main>
  </body>
